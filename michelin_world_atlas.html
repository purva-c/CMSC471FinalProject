<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: -apple-system, "Helvetica Neue", Arial, sans-serif;
  background: #f4f1eb;
  color: #1a1a1a;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── HEADER ── */
header {
  background: #1a1a1a;
  color: #f4f1eb;
  padding: 14px 24px;
  display: flex;
  align-items: baseline;
  gap: 16px;
  flex-shrink: 0;
}

header h1 {
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}

header p {
  font-size: 12px;
  color: #888;
}

.legend {
  margin-left: auto;
  display: flex;
  gap: 16px;
  align-items: center;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 4px;
  transition: background 0.15s;
  user-select: none;
  color: #f4f1eb;
}
.legend-item:hover { background: rgba(255,255,255,0.08); }
.legend-item.off { opacity: 0.35; }

.legend-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* ── BODY SPLIT ── */
.body {
  flex: 1;
  display: flex;
  overflow: hidden;
}

/* ── MAP ── */
#map {
  flex: 1;
  position: relative;
}

.leaflet-container { background: #d6e4f0 !important; }

/* ── TOOLTIP ── */
#tip {
  position: fixed;
  z-index: 9999;
  background: #1a1a1a;
  color: #f4f1eb;
  border-radius: 6px;
  padding: 8px 12px;
  pointer-events: none;
  font-size: 12px;
  max-width: 200px;
  display: none;
  line-height: 1.5;
}

#tip strong { font-size: 13px; display: block; margin-bottom: 2px; }
#tip .tip-award { font-size: 11px; margin-bottom: 1px; }
#tip .tip-loc { color: #aaa; font-size: 11px; }

/* ── RIGHT PANEL ── */
#panel {
  width: 320px;
  background: #fff;
  border-left: 1px solid #e0dbd0;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  flex-shrink: 0;
}

.panel-header {
  padding: 18px 20px 12px;
  border-bottom: 1px solid #e8e4da;
}

.panel-header h2 {
  font-size: 13px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: #1a1a1a;
}

.panel-header p {
  font-size: 11px;
  color: #888;
  margin-top: 3px;
}

/* ── CHART ── */
#chart {
  flex: 1;
  overflow-y: auto;
  padding: 16px 20px;
}

#chart::-webkit-scrollbar { width: 4px; }
#chart::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }

.country-row {
  margin-bottom: 14px;
  cursor: pointer;
}

.country-row:hover .country-name { color: #c41230; }

.country-top {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 5px;
}

.country-name {
  font-size: 13px;
  font-weight: 600;
  transition: color 0.15s;
}

.country-total {
  font-size: 11px;
  color: #999;
}

.bar-track {
  height: 16px;
  background: #f0ede6;
  border-radius: 3px;
  overflow: hidden;
  display: flex;
}

.bar-seg {
  height: 100%;
  transition: width 0.4s ease;
  min-width: 0;
}

.bar-seg.s3 { background: #c41230; }
.bar-seg.s2 { background: #e8523a; }
.bar-seg.s1 { background: #f0a030; }

.bar-labels {
  display: flex;
  gap: 10px;
  margin-top: 4px;
}

.bar-label {
  font-size: 10px;
  color: #999;
}

.bar-label span { font-weight: 600; color: #444; }

/* ── INSIGHT BOX ── */
.insight {
  margin: 0 20px 16px;
  background: #f9f6ef;
  border-left: 3px solid #c41230;
  padding: 10px 12px;
  border-radius: 0 4px 4px 0;
  font-size: 11px;
  line-height: 1.5;
  color: #555;
  flex-shrink: 0;
}

.insight strong { color: #1a1a1a; }

/* ── CLUSTER ── */
.marker-cluster div {
  background: rgba(26,26,26,0.75) !important;
  color: #fff !important;
  font-size: 11px !important;
  font-weight: 700 !important;
  font-family: -apple-system, sans-serif !important;
}
.marker-cluster { background: rgba(26,26,26,0.2) !important; }

.leaflet-control-zoom {
  border: 1px solid #ccc !important;
  border-radius: 6px !important;
  overflow: hidden;
}
.leaflet-control-zoom a {
  background: #fff !important;
  color: #333 !important;
  border-bottom: 1px solid #eee !important;
}
</style>
</head>

const COUNTRY_DATA=[{"country":"France","one":548,"two":81,"three":30,"total":659},{"country":"Italy","one":333,"two":38,"three":15,"total":386},{"country":"Japan","one":279,"two":61,"three":20,"total":360},{"country":"Germany","one":272,"two":45,"three":11,"total":328},{"country":"Spain","one":249,"two":37,"three":16,"total":302},{"country":"USA","one":221,"two":40,"three":14,"total":275},{"country":"United Kingdom","one":171,"two":23,"three":10,"total":204},{"country":"Chinese Mainland","one":122,"two":25,"three":3,"total":150},{"country":"Switzerland","one":104,"two":26,"three":4,"total":134},{"country":"Belgium","one":103,"two":18,"three":2,"total":123},{"country":"Netherlands","one":96,"two":19,"three":1,"total":116},{"country":"Austria","one":79,"two":19,"three":2,"total":100},{"country":"Hong Kong SAR China","one":57,"two":13,"three":7,"total":77},{"country":"Taiwan","one":43,"two":7,"three":3,"total":53},{"country":"Portugal","one":44,"two":9,"three":0,"total":53}];

const AWARDS = {
  '3 Stars': { color:'#c41230', size:8,  z:1000 },
  '2 Stars': { color:'#e8523a', size:6,  z:900  },
  '1 Star':  { color:'#f0a030', size:5,  z:800  },
};

const active = new Set(['3 Stars','2 Stars','1 Star']);

// ── MAP ──
const map = L.map('map', {
  center: [35, 15],
  zoom: 3,
  minZoom: 2,
  maxZoom: 10,
  zoomControl: false,
});
L.control.zoom({ position: 'bottomright' }).addTo(map);

// Light tile — CartoDB Positron (clean, readable)
const tile = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; OpenStreetMap &copy; CARTO',
  subdomains: 'abcd', maxZoom: 19
}).addTo(map);

tile.on('tileerror', () => {
  map.removeLayer(tile);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap', subdomains: 'abc', maxZoom: 19
  }).addTo(map);
  map.removeLayer(cluster); map.addLayer(cluster);
});

const cluster = L.markerClusterGroup({
  maxClusterRadius: 45,
  showCoverageOnHover: false,
  zoomToBoundsOnClick: true,
  spiderfyOnMaxZoom: true,
  disableClusteringAtZoom: 8,
  maxZoom: 8,
  iconCreateFunction(c) {
    const n = c.getChildCount();
    const s = n > 200 ? 34 : n > 50 ? 28 : 22;
    return L.divIcon({
      html: `<div style="width:${s}px;height:${s}px;border-radius:50%;background:rgba(26,26,26,0.72);display:flex;align-items:center;justify-content:center;font-size:${s>28?12:10}px;font-weight:700;color:#fff;border:1.5px solid rgba(255,255,255,0.3)">${n>999?Math.round(n/1000)+'k':n}</div>`,
      className: '',
      iconSize: [s,s], iconAnchor:[s/2,s/2],
    });
  }
});
map.addLayer(cluster);

// ── TOOLTIP ──
const tip = document.getElementById('tip');
function showTip(d, e) {
  const cfg = AWARDS[d.a];
  tip.innerHTML = `<strong>${d.n}</strong><div class="tip-award" style="color:${cfg.color}">${d.a}</div><div class="tip-loc">${d.lo}</div>${d.c ? `<div class="tip-loc">${d.c}</div>` : ''}`;
  tip.style.display = 'block';
  moveTip(e);
}
function moveTip(e) {
  const x = e.originalEvent.clientX, y = e.originalEvent.clientY;
  tip.style.left = (x + 14) + 'px';
  tip.style.top  = (y - 10) + 'px';
}

// ── RENDER MAP ──
function render() {
  cluster.clearLayers();
  const pts = MAP_DATA.filter(d => active.has(d.a));
  cluster.addLayers(pts.map(d => {
    const cfg = AWARDS[d.a];
    const m = L.marker([d.lat, d.lon], {
      icon: L.divIcon({
        className: '',
        html: `<div style="width:${cfg.size}px;height:${cfg.size}px;border-radius:50%;background:${cfg.color};border:1.5px solid rgba(255,255,255,0.6)"></div>`,
        iconSize: [cfg.size,cfg.size], iconAnchor:[cfg.size/2,cfg.size/2],
      }),
      zIndexOffset: cfg.z
    });
    m.on('mouseover', e => showTip(d,e));
    m.on('mousemove', moveTip);
    m.on('mouseout', () => tip.style.display='none');
    return m;
  }));
}

// ── LEGEND TOGGLE ──
document.querySelectorAll('.legend-item').forEach(el => {
  el.addEventListener('click', () => {
    const a = el.dataset.a;
    if (active.has(a)) active.delete(a); else active.add(a);
    el.classList.toggle('off', !active.has(a));
    render();
  });
});

// ── COUNTRY CHART ──
const maxTotal = COUNTRY_DATA[0].total;

function buildChart() {
  const chart = document.getElementById('chart');
  chart.innerHTML = COUNTRY_DATA.map(d => {
    const w3 = (d.three / maxTotal * 100).toFixed(1);
    const w2 = (d.two   / maxTotal * 100).toFixed(1);
    const w1 = (d.one   / maxTotal * 100).toFixed(1);
    return `
    <div class="country-row" data-country="${d.country}">
      <div class="country-top">
        <span class="country-name">${d.country}</span>
        <span class="country-total">${d.total} total</span>
      </div>
      <div class="bar-track">
        <div class="bar-seg s3" style="width:${w3}%"></div>
        <div class="bar-seg s2" style="width:${w2}%"></div>
        <div class="bar-seg s1" style="width:${w1}%"></div>
      </div>
      <div class="bar-labels">
        ${d.three ? `<span class="bar-label" style="color:#c41230"><span>${d.three}</span> ★★★</span>` : ''}
        ${d.two   ? `<span class="bar-label" style="color:#e8523a"><span>${d.two}</span> ★★</span>` : ''}
        ${d.one   ? `<span class="bar-label" style="color:#f0a030"><span>${d.one}</span> ★</span>` : ''}
      </div>
    </div>`;
  }).join('');

  // Country click → zoom map to country level (never too close)
  // zoom 4 = country overview, 5 = small country, 3 = large country like USA/China
  const COORDS = {
    'France':              { ll:[46.5,2.5],   z:5 },
    'Italy':               { ll:[42.5,12],    z:5 },
    'Japan':               { ll:[36.5,138],   z:5 },
    'Germany':             { ll:[51,10],      z:5 },
    'Spain':               { ll:[40,-4],      z:5 },
    'USA':                 { ll:[38,-97],     z:4 },
    'United Kingdom':      { ll:[54,-2],      z:5 },
    'Chinese Mainland':    { ll:[35,105],     z:4 },
    'Switzerland':         { ll:[47,8],       z:6 },
    'Belgium':             { ll:[50.5,4],     z:7 },
    'Netherlands':         { ll:[52.5,5.3],   z:7 },
    'Austria':             { ll:[47.5,14],    z:6 },
    'Hong Kong SAR China': { ll:[22.3,114.2], z:10 },
    'Taiwan':              { ll:[23.7,121],   z:7 },
    'Portugal':            { ll:[39.5,-8],    z:6 },
  };
  chart.querySelectorAll('.country-row').forEach(row => {
    row.addEventListener('click', () => {
      const c = row.dataset.country;
      if (COORDS[c]) map.flyTo(COORDS[c].ll, COORDS[c].z, { duration: 1 });
    });
  });
}

buildChart();
render();
</script>
